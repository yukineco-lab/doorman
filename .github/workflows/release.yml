name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact_glob: dist/*-setup.exe
          - os: macos-latest
            script: build:mac
            artifact_glob: dist/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # `-- --publish never` disables electron-builder's implicit
        # publish-on-tag behavior; release upload is handled separately below.
        run: npm run ${{ matrix.script }} -- --publish never
        env:
          # Skip macOS code signing / notarization (open-source unsigned distribution)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts (workflow runs)
        uses: actions/upload-artifact@v4
        with:
          name: doorman-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
          draft: false
          generate_release_notes: true
